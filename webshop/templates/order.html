<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>ES KAY Kosmos Shop - Poruči {{ product.name }}</title>
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #f4f7fb; color: #202020; }
      .page { max-width: 560px; margin: 2rem auto; background: #fff; border-radius: 14px; padding: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
      .page h1 { margin-top: 0; font-size: 1.6rem; color: #1a2d6c; }
      .product { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
      .product img { width: 150px; height: 150px; object-fit: cover; border-radius: 10px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
      .product-info p { margin: 0.2rem 0; }
      form { margin-top: 0.7rem; display: grid; gap: 0.65rem; }
      label { font-weight: 600; font-size: 0.95rem; }
      input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #c8d4e4; border-radius: 7px; font-size: 1rem; }
      button { border: none; background: #1e46b1; color: #fff; border-radius: 8px; padding: 0.7rem 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; }
      button:hover { background: #ff5c00; }
      a.back { display: inline-block; margin-top: 1rem; color: #1e46b1; text-decoration: none; }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>Poruči {{ product.name }}</h1>
      <section class="product">
        <img src="{{ product.image }}" alt="{{ product.name }}">
        <div class="product-info">
          <p><strong>Cena:</strong> ${{ product.price }}</p>
          <p><strong>Dostava:</strong> {{ product.delivery }}</p>
        </div>
      </section>
      <form method="post">
        <label>Ime<input type="text" name="name" required></label>
        <label>Adresa<input type="text" name="address" required></label>
        <label>Telefon<input type="text" name="phone" required></label>
        <button type="submit">Pošalji</button>
      </form>
      <p><a class="back" href="{{ url_for('index') }}">← Nazad na proizvode</a></p>
    </main>
  </body>
</html>
